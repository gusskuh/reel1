name: Daily Reel Generation

on:
  schedule:
    # Run daily at 9:00 AM UTC (adjust timezone as needed)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual triggering
    inputs:
      test_mode:
        description: 'Test mode (skip YouTube upload)'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-reel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "FMP_API_KEY=${{ secrets.FMP_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}" >> .env
          echo "YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}" >> .env
          echo "YOUTUBE_REDIRECT_URI=${{ secrets.YOUTUBE_REDIRECT_URI || 'http://localhost:3000/oauth2callback' }}" >> .env
          echo "TIKTOK_CLIENT_KEY=${{ secrets.TIKTOK_CLIENT_KEY }}" >> .env
          echo "TIKTOK_CLIENT_SECRET=${{ secrets.TIKTOK_CLIENT_SECRET }}" >> .env
          echo "TIKTOK_REDIRECT_URI=${{ secrets.TIKTOK_REDIRECT_URI || 'http://localhost:3000/tiktok_callback' }}" >> .env
          echo "X_API_KEY=${{ secrets.X_API_KEY }}" >> .env
          echo "X_API_SECRET=${{ secrets.X_API_SECRET }}" >> .env
          echo "X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }}" >> .env
          echo "X_ACCESS_TOKEN_SECRET=${{ secrets.X_ACCESS_TOKEN_SECRET }}" >> .env
          if [ "${{ inputs.test_mode }}" == "true" ]; then
            echo "UPLOAD_TO_YOUTUBE=false" >> .env
            echo "UPLOAD_TO_TIKTOK=false" >> .env
            echo "UPLOAD_TO_X=false" >> .env
          else
            echo "UPLOAD_TO_YOUTUBE=${{ secrets.UPLOAD_TO_YOUTUBE || 'true' }}" >> .env
            echo "UPLOAD_TO_TIKTOK=${{ secrets.UPLOAD_TO_TIKTOK || 'false' }}" >> .env
            echo "UPLOAD_TO_X=${{ secrets.UPLOAD_TO_X || 'false' }}" >> .env
          fi
          echo "✅ .env file created"
          echo "YouTube upload enabled: $(grep UPLOAD_TO_YOUTUBE .env)"
          echo "TikTok upload enabled: $(grep UPLOAD_TO_TIKTOK .env)"
          echo "X upload enabled: $(grep UPLOAD_TO_X .env)"

      - name: Setup YouTube token
        run: |
          if [ -n "${{ secrets.YOUTUBE_TOKEN_JSON }}" ]; then
            echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json
            echo "✅ YouTube token configured"
            echo "Token file created: $(ls -la youtube_token.json)"
          else
            echo "❌ ERROR: YOUTUBE_TOKEN_JSON secret is missing!"
            echo "To enable YouTube upload:"
            echo "1. Run the script locally: npm run create-reel"
            echo "2. Authorize YouTube when prompted"
            echo "3. Copy the contents of youtube_token.json"
            echo "4. Add it as a secret named YOUTUBE_TOKEN_JSON in GitHub"
            exit 1
          fi

      - name: Setup TikTok token
        run: |
          if [ -n "${{ secrets.TIKTOK_TOKEN_JSON }}" ]; then
            echo '${{ secrets.TIKTOK_TOKEN_JSON }}' > tiktok_token.json
            echo "✅ TikTok token configured"
            echo "Token file created: $(ls -la tiktok_token.json)"
          else
            echo "⚠️  TikTok token not provided"
            echo "To enable TikTok upload:"
            echo "1. Set up TikTok Developer app (see TIKTOK_SETUP.md)"
            echo "2. Run the script locally: npm run create-reel"
            echo "3. Authorize TikTok when prompted"
            echo "4. Copy the contents of tiktok_token.json"
            echo "5. Add it as a secret named TIKTOK_TOKEN_JSON in GitHub"
          fi

      - name: Setup X token
        run: |
          if [ -n "${{ secrets.X_TOKEN_JSON }}" ]; then
            echo '${{ secrets.X_TOKEN_JSON }}' > x_token.json
            echo "✅ X token configured"
            echo "Token file created: $(ls -la x_token.json)"
          else
            echo "⚠️  X token not provided"
            echo "To enable X upload:"
            echo "1. Set up X Developer app (see X_SETUP.md)"
            echo "2. Get API keys and tokens from X Developer Portal"
            echo "3. Create x_token.json with oauth_token and oauth_token_secret"
            echo "4. Add it as a secret named X_TOKEN_JSON in GitHub"
          fi

      - name: Verify environment
        run: |
          echo "Checking environment setup..."
          if [ -f .env ]; then
            echo "✅ .env file exists"
            echo "API keys present: $(grep -c 'API_KEY' .env || echo 0)"
          else
            echo "❌ .env file missing!"
            exit 1
          fi
      
      - name: Generate reel
        run: npm run create-reel
        continue-on-error: true
        env:
          NODE_ENV: production

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-reel-${{ github.run_number }}
          path: |
            dynamic_reel.mp4
            news_reel.mp4
          retention-days: 7

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Reel generated successfully!"
          echo "Check the artifacts for the generated video."

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Reel generation failed!"
          echo "Check the logs artifact for details."

